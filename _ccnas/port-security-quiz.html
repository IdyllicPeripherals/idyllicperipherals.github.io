<head>
    <style>
        .question {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .Bold {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 2em;
        }
        .question label {
            margin-right: 10px;
            min-width: 200px;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #000;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .correct {
            background-color: green;
        }
        .incorrect {
            background-color: red;
        }
        input[type="text"] {
            padding: 5px;
            width: 400px;
            font-family: monospace;
            font-size: 0.95em;
        }
        .hint-btn {
            margin-left: 10px;
            font-size: 18px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            padding: 5px 10px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .hint-btn:active {
            background-color: #e0e0e0;
        }
        .part-label {
            font-size: 0.85em;
            color: #555;
            margin-right: 4px;
            flex-shrink: 0;
        }
        h1, h2 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.5em;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="Bold">Port Security</div>

    <!-- Q0 -->

        <button class="hint-btn" tabindex="-1" onmousedown="showHint('q0', 'switchport port-security mac-address 1111')" onmouseup="clearHint('q0')">?</button>
    </div>

    <div class="question">
        <label for="q6">Configure the port security aging type to absolute:</label>
        <input type="text" id="q6" oninput="checkAnswer('q6', 'switchport port-security aging type absolute', this)">
        <div class="checkbox" id="q6-checkbox"></div>

    <!-- Q7 -->
    <div class="question">
        <label for="q7">Configure the port security aging type to inactivity:</label>
        <input type="text" id="q7" oninput="checkAnswer('q7', 'switchport port-security aging type inactivity', this)">

    <div class="question">
        <label for="q8">Enable aging of static secure MAC addresses:</label>
        <input type="text" id="q8" oninput="checkAnswer('q8', 'switchport port-security aging static', this)">

    <!-- Q9 -->
    <div class="question">
        <label for="q9">Enable errdisable recovery for port security violations:</label>
        <input type="text" id="q9" oninput="checkAnswer('q9', 'errdisable recovery cause psecure-violation', this)">
        <div class="checkbox" id="q9-checkbox"></div>

    <!-- Q10 -->
    <div class="question">
        <label for="q10">Configure the errdisable recovery interval to 30 seconds:</label>
        <input type="text" id="q10" oninput="checkAnswer('q10', 'errdisable recovery interval 30', this)">

    </div>

    <div class="question">

    </div>

    <!-- Q12 -->
    <div class="question">
        <label for="q12">Show a summary of port security-enabled switchports:</label>
        <input type="text" id="q12" oninput="checkAnswer('q12', 'show port-security', this)">
        <div class="checkbox" id="q12-checkbox"></div>
        <button class="hint-btn" tabindex="-1" onmousedown="showHint('q12', 'show port-security')" onmouseup="clearHint('q12')">?</button>
    </div>

    <!-- Q13 -->
    <div class="question">
        <label for="q13">Show port security information for the individual switchport fa 0/1:</label>
        <input type="text" id="q13" oninput="checkAnswer('q13', 'show port-security interface fa 0/1', this)">
        <div class="checkbox" id="q13-checkbox"></div>
        <button class="hint-btn" tabindex="-1" onmousedown="showHint('q13', 'show port-security interface fa 0/1')" onmouseup="clearHint('q13')">?</button>
    </div>

    <!-- Q14 -->
    <div class="question">
        <label for="q14">Show a summary of errdisable recovery information:</label>
        <input type="text" id="q14" oninput="checkAnswer('q14', 'show errdisable recovery', this)">
        <div class="checkbox" id="q14-checkbox"></div>
        <button class="hint-btn" tabindex="-1" onmousedown="showHint('q14', 'show errdisable recovery')" onmouseup="clearHint('q14')">?</button>
    </div>

    <!-- Q15 – two-part -->
    <div class="question" style="flex-wrap: nowrap;">
        <label style="white-space: nowrap;">Manually re-enable an interface disabled by port security:</label>
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <div style="display: flex; align-items: center; gap: 6px;">
                <span class="part-label">Step 1:</span>
                <input type="text" id="q15a" style="width: 400px;" oninput="checkAnswerMulti()">
                <div class="checkbox" id="q15a-checkbox"></div>
                <button class="hint-btn" tabindex="-1" onmousedown="showHint('q15a', 'shutdown')" onmouseup="clearHint('q15a')">?</button>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
                <span class="part-label">Step 2:</span>
                <input type="text" id="q15b" style="width: 400px;" oninput="checkAnswerMulti()">
                <div class="checkbox" id="q15b-checkbox"></div>
                <button class="hint-btn" tabindex="-1" onmousedown="showHint('q15b', 'no shutdown')" onmouseup="clearHint('q15b')">?</button>
            </div>
        </div>
    </div>

    <script>
        let savedAnswers = {};

        const answers = {
            'q0':  'switchport port-security mac-address 1111',
            'q1':  'switchport port-security mac-address sticky',
            'q2':  'switchport port-security violation protect',
            'q3':  'switchport port-security violation restrict',
            'q4':  'switchport port-security violation shutdown',
            'q5':  'switchport port-security aging time 7',
            'q6':  'switchport port-security aging type absolute',
            'q7':  'switchport port-security aging type inactivity',
            'q8':  'switchport port-security aging static',
            'q9':  'errdisable recovery cause psecure-violation',
            'q10': 'errdisable recovery interval 30',
            'q11': 'show mac address-table secure',
            'q12': 'show port-security',
            'q13': 'show port-security interface fa 0/1',
            'q14': 'show errdisable recovery',
            'q15a': 'shutdown',
            'q15b': 'no shutdown',
        };

        function checkAnswer(questionId, correctAnswer, inputElement) {
            const checkbox = document.getElementById(questionId + '-checkbox');
            const answer = inputElement.value.trim().toLowerCase();
            const correct = correctAnswer.toLowerCase();
            if (answer === correct) {
                checkbox.classList.add('correct');
                checkbox.classList.remove('incorrect');
            } else {
                checkbox.classList.remove('correct');
                checkbox.classList.add('incorrect');
            }
        }

        function checkAnswerMulti() {
            const aInput = document.getElementById('q15a');
            const bInput = document.getElementById('q15b');
            const aBox = document.getElementById('q15a-checkbox');
            const bBox = document.getElementById('q15b-checkbox');
            const aVal = aInput.value.trim().toLowerCase();
            const bVal = bInput.value.trim().toLowerCase();
            if (aVal === 'shutdown') {
                aBox.classList.add('correct'); aBox.classList.remove('incorrect');
            } else {
                aBox.classList.remove('correct'); aBox.classList.add('incorrect');
            }
            if (bVal === 'no shutdown') {
                bBox.classList.add('correct'); bBox.classList.remove('incorrect');
            } else {
                bBox.classList.remove('correct'); bBox.classList.add('incorrect');
            }
        }

        function showHint(questionId, hint) {
            const inputElement = document.getElementById(questionId);
            savedAnswers[questionId] = inputElement.value;
            inputElement.value = hint;
        }

        function clearHint(questionId) {
            const inputElement = document.getElementById(questionId);
            inputElement.value = savedAnswers[questionId] || '';
        }

        const inputOrder = ['q0','q1','q2','q3','q4','q5','q6','q7','q8','q9','q10','q11','q12','q13','q14','q15a','q15b'];

        function tabComplete(e, questionId) {
            if (e.key !== 'Tab') return;
            const answer = answers[questionId];
            if (!answer) return;
            const input = document.getElementById(questionId);
            const typed = input.value;
            e.preventDefault();

            // If answer is already fully correct, move to next box
            if (typed.trim().toLowerCase() === answer.toLowerCase()) {
                const currentIndex = inputOrder.indexOf(questionId);
                if (currentIndex !== -1 && currentIndex < inputOrder.length - 1) {
                    document.getElementById(inputOrder[currentIndex + 1]).focus();
                }
                return;
            }

            // Otherwise attempt word-by-word completion
            if (!typed || !answer.toLowerCase().startsWith(typed.toLowerCase())) return;
            const rest = answer.slice(typed.length);
            if (!rest) return;
            // Block if user hasn't started typing the current word yet
            if (typed.length === 0 || typed[typed.length - 1] === ' ') return;
            const spaceIdx = rest.indexOf(' ');
            input.value = spaceIdx === -1 ? answer : typed + rest.slice(0, spaceIdx + 1);
            if (questionId === 'q15a' || questionId === 'q15b') {
                checkAnswerMulti();
            } else {
                checkAnswer(questionId, answer, input);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            Object.keys(answers).forEach(function(id) {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('keydown', function(e) { tabComplete(e, id); });
                }
            });
        });
    </script>
</body>
